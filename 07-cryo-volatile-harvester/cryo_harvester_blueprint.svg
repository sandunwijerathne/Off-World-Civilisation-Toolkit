<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <text x="50" y="70" fill="#DCEBFA" font-size="28" letter-spacing="3" font-weight="bold">CRYO-VOLATILE HARVESTER — CVH-1 "PERSEPHONE"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">LUNAR PSR ICE-MINING ROVER · SIDE ELEVATION · EXTRACTION DETAIL · SHEET 1 OF 5</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ======== MAIN SIDE ELEVATION ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- crater floor ground line -->
    <line x1="80" y1="600" x2="900" y2="600" stroke-width="1.2"/>
    <g stroke-width="0.7">
      <line x1="100" y1="600" x2="88" y2="614"/><line x1="140" y1="600" x2="128" y2="614"/>
      <line x1="180" y1="600" x2="168" y2="614"/><line x1="260" y1="600" x2="248" y2="614"/>
      <line x1="700" y1="600" x2="688" y2="614"/><line x1="740" y1="600" x2="728" y2="614"/>
      <line x1="780" y1="600" x2="768" y2="614"/><line x1="820" y1="600" x2="808" y2="614"/>
    </g>
    <text x="120" y="632" fill="#6FC3FF" font-size="10" stroke="none">ICY REGOLITH -230 C (PSR FLOOR)</text>

    <!-- wheels (6 cold-tolerant) -->
    <g>
      <circle cx="330" cy="560" r="34"/><circle cx="330" cy="560" r="10"/>
      <circle cx="430" cy="560" r="34"/><circle cx="430" cy="560" r="10"/>
      <circle cx="540" cy="560" r="34"/><circle cx="540" cy="560" r="10"/>
      <path d="M 306 542 l -6 -6 M 306 578 l -6 6 M 354 542 l 6 -6 M 354 578 l 6 6" stroke-width="0.8"/>
    </g>

    <!-- rover body -->
    <rect x="300" y="420" width="290" height="110" rx="12"/>

    <!-- cold trap (cutaway inside body) -->
    <circle cx="360" cy="475" r="34"/>
    <circle cx="360" cy="475" r="22" stroke-dasharray="4 3" stroke-width="1"/>
    <path d="M 360 453 l -6 12 h12 z M 360 497 l -6 -12 h12 z" stroke-width="0.8"/>
    <text x="360" y="479" fill="#6FC3FF" font-size="9" text-anchor="middle" stroke="none">COLD</text>
    <text x="360" y="490" fill="#6FC3FF" font-size="9" text-anchor="middle" stroke="none">TRAP</text>

    <!-- battery bank -->
    <rect x="418" y="450" width="70" height="50"/>
    <path d="M 418 466 h70 M 418 482 h70" stroke-width="0.7"/>
    <path d="M 430 442 v8 M 450 442 v8 M 470 442 v8" stroke-width="1"/>
    <text x="453" y="516" fill="#6FC3FF" font-size="9" text-anchor="middle" stroke="none">BATTERY</text>

    <!-- avionics warm box -->
    <rect x="506" y="452" width="66" height="46" rx="4"/>
    <path d="M 512 470 q 8 -8 16 0 q 8 8 16 0 q 8 -8 16 0" stroke="#6FC3FF" stroke-width="0.9"/>
    <text x="539" y="516" fill="#6FC3FF" font-size="9" text-anchor="middle" stroke="none">WARM BOX</text>

    <!-- extraction head arm (front, into ground) -->
    <line x1="300" y1="470" x2="210" y2="470" stroke-width="2.5"/>
    <line x1="210" y1="470" x2="180" y2="560" stroke-width="2.5"/>
    <path d="M 165 560 h 30 l -6 34 h -18 z"/>
    <!-- vapour shroud -->
    <path d="M 150 594 q 30 -20 60 0" stroke-width="1.2" stroke-dasharray="4 3"/>
    <!-- heat waves + vapour arrows -->
    <g stroke="#6FC3FF" stroke-width="1">
      <path d="M 172 588 q 6 -14 0 -28" marker-end="url(#arrow)"/>
      <path d="M 188 588 q 6 -14 0 -28" marker-end="url(#arrow)"/>
    </g>
    <!-- vapour transfer line to cold trap -->
    <path d="M 180 560 q 60 -60 150 -70" stroke="#6FC3FF" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text x="150" y="660" fill="#6FC3FF" font-size="10" stroke="none">HEATED HEAD → SUBLIMATE ICE</text>

    <!-- sensor / light mast -->
    <line x1="450" y1="420" x2="450" y2="340"/>
    <rect x="428" y="306" width="44" height="34" rx="5"/>
    <circle cx="450" cy="323" r="9"/>
    <!-- headlights cone (active sensing in dark) -->
    <path d="M 428 330 l -60 30 M 428 316 l -60 -18" stroke="#6FC3FF" stroke-width="0.8" stroke-dasharray="4 3"/>
    <text x="360" y="300" fill="#6FC3FF" font-size="9" stroke="none">LIDAR + LIGHTS (DARK NAV)</text>

    <!-- ice hopper (rear) -->
    <path d="M 590 470 h 40 l -8 50 h -24 z"/>
    <path d="M 596 486 h 28 M 598 502 h 24" stroke-width="0.7"/>
  </g>

  <!-- ======== RIM PLANT INSET (top right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.2">
    <rect x="1000" y="140" width="340" height="250" fill="#0E3357" stroke="#6FC3FF"/>
    <text x="1016" y="164" fill="#6FC3FF" font-size="12" letter-spacing="1" stroke="none">FIG. B — TWO-ZONE OPERATION</text>
    <!-- crater profile -->
    <path d="M 1020 340 Q 1090 240 1170 340 Q 1250 240 1320 340" stroke-width="1.2"/>
    <!-- sun on rim -->
    <circle cx="1305" cy="210" r="14"/>
    <path d="M 1305 190 v-10 M 1305 230 v10 M 1285 210 h-10 M 1325 210 h10 M 1291 196 l-7 -7 M 1319 224 l7 7" stroke-width="0.7"/>
    <!-- rim plant -->
    <rect x="1284" y="316" width="30" height="24"/>
    <text x="1299" y="358" fill="#DCEBFA" font-size="8.5" text-anchor="middle" stroke="none">RIM PLANT</text>
    <!-- rover in shadow -->
    <rect x="1120" y="330" width="24" height="14"/>
    <text x="1132" y="360" fill="#DCEBFA" font-size="8.5" text-anchor="middle" stroke="none">ROVER (DARK)</text>
    <!-- shuttle arrow -->
    <path d="M 1144 330 Q 1210 300 1282 322" stroke="#6FC3FF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text x="1170" y="298" fill="#6FC3FF" font-size="8.5" stroke="none">ICE SHUTTLE</text>
    <text x="1016" y="382" fill="#6FC3FF" font-size="9" stroke="none">MINE IN DARK · PROCESS IN SUN</text>
  </g>

  <!-- ======== DETAIL A: extraction head + cold trap cycle ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.4">
    <circle cx="1120" cy="580" r="86" stroke="#6FC3FF"/>
    <!-- regolith hatch -->
    <line x1="1060" y1="620" x2="1180" y2="620" stroke-width="1.2"/>
    <g stroke-width="0.6">
      <line x1="1070" y1="620" x2="1062" y2="632"/><line x1="1095" y1="620" x2="1087" y2="632"/>
      <line x1="1120" y1="620" x2="1112" y2="632"/><line x1="1145" y1="620" x2="1137" y2="632"/>
      <line x1="1170" y1="620" x2="1162" y2="632"/>
    </g>
    <!-- heated head -->
    <rect x="1104" y="596" width="32" height="24"/>
    <path d="M 1112 618 q 4 -10 0 -18 M 1120 618 q 4 -10 0 -18 M 1128 618 q 4 -10 0 -18" stroke="#6FC3FF" stroke-width="0.9"/>
    <!-- vapour rising to trap -->
    <path d="M 1120 596 q -30 -20 -40 -50" stroke="#6FC3FF" stroke-width="1" marker-end="url(#arrow)"/>
    <circle cx="1076" cy="536" r="20"/>
    <path d="M 1076 522 l -4 8 h8 z" stroke-width="0.7"/>
    <g fill="#DCEBFA" font-size="9" stroke="none">
      <text x="1076" y="512" text-anchor="middle">COLD TRAP</text>
      <text x="1120" y="590" text-anchor="middle" font-size="8">HEAT</text>
    </g>
    <text x="1120" y="694" fill="#6FC3FF" font-size="12" text-anchor="middle" stroke="none">DETAIL A — SUBLIMATE + RE-FREEZE CYCLE</text>
    <line x1="185" y1="560" x2="1034" y2="566" stroke="#6FC3FF" stroke-width="0.9" stroke-dasharray="5 4"/>
  </g>

  <!-- ======== CALLOUTS ======== -->
  <g stroke="#6FC3FF" stroke-width="1" fill="none">
    <line x1="180" y1="580" x2="150" y2="700" marker-start="url(#arrow)"/>
    <line x1="360" y1="509" x2="300" y2="700" marker-start="url(#arrow)"/>
    <line x1="453" y1="450" x2="530" y2="230" marker-start="url(#arrow)"/>
    <line x1="450" y1="306" x2="560" y2="230" marker-start="url(#arrow)"/>
    <line x1="330" y1="594" x2="640" y2="700" marker-start="url(#arrow)"/>
    <line x1="610" y1="500" x2="700" y2="700" marker-start="url(#arrow)"/>
  </g>
  <g fill="#DCEBFA" font-size="13">
    <g><circle cx="150" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="150" y="717" text-anchor="middle">1</text></g>
    <g><circle cx="300" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="300" y="717" text-anchor="middle">2</text></g>
    <g><circle cx="530" cy="222" r="12" fill="none" stroke="#6FC3FF"/><text x="530" y="227" text-anchor="middle">3</text></g>
    <g><circle cx="568" cy="222" r="12" fill="none" stroke="#6FC3FF"/><text x="568" y="227" text-anchor="middle">4</text></g>
    <g><circle cx="640" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="640" y="717" text-anchor="middle">5</text></g>
    <g><circle cx="700" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="700" y="717" text-anchor="middle">6</text></g>
  </g>

  <!-- dimension -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="165" y1="650" x2="630" y2="650" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="398" y="672" text-anchor="middle" font-size="13">ROVER LENGTH 6.2 m (HEAD DEPLOYED)</text>
  </g>

  <!-- ======== PARTS LIST ======== -->
  <g font-size="13" fill="#DCEBFA">
    <rect x="50" y="760" width="620" height="196" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="785" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="794" x2="654" y2="794" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="814">1 — HEATED EXTRACTION HEAD: sublimates buried ice, vapour shroud</text>
    <text x="66" y="834">2 — COLD TRAP: re-freezes vapour as pure ice, leaves dust behind</text>
    <text x="66" y="854">3 — BATTERY BANK: charged at sunlit rim, powers dark traverses</text>
    <text x="66" y="874">4 — WARM BOX + LIDAR MAST: heated avionics, active dark navigation</text>
    <text x="66" y="894">5 — COLD-TOLERANT WHEELS (x6): cryo lubricants, -230 C rated</text>
    <text x="66" y="914">6 — ICE HOPPER: stores harvested ice for shuttle to rim plant</text>
    <text x="66" y="936" font-size="11" fill="#6FC3FF">RIM PLANT (SEPARATE): melt · purify · electrolyse → O2 + H2</text>
  </g>

  <text x="1350" y="750" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

  <!-- ======== TITLE BLOCK ======== -->
  <g font-size="12" fill="#DCEBFA">
    <rect x="700" y="760" width="650" height="196" fill="#0E3357" stroke="#DCEBFA" stroke-width="1.5"/>
    <line x1="700" y1="804" x2="1350" y2="804" stroke="#DCEBFA"/>
    <line x1="700" y1="848" x2="1350" y2="848" stroke="#DCEBFA"/>
    <line x1="700" y1="902" x2="1350" y2="902" stroke="#DCEBFA"/>
    <line x1="1030" y1="760" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="780" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="798" font-size="13" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="780" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="798" font-size="13" font-weight="bold">CVH-1-GA-001 · REV A</text>
    <text x="716" y="824" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="842" font-weight="bold" font-size="11">CVH-1 "PERSEPHONE" — GENERAL ARRANGEMENT</text>
    <text x="1046" y="824" fill="#6FC3FF">ENVIRONMENT</text>
    <text x="1046" y="842" font-weight="bold" font-size="11">LUNAR PSR, -230 C</text>
    <text x="716" y="868" fill="#6FC3FF">DEPLOYMENT</text>
    <text x="716" y="886" font-weight="bold" font-size="11">PERMANENTLY SHADOWED POLAR CRATERS</text>
    <text x="1046" y="868" fill="#6FC3FF">PRODUCT</text>
    <text x="1046" y="886" font-weight="bold" font-size="11">WATER → O2 + H2</text>
    <text x="716" y="924" fill="#6FC3FF">FUNCTION</text>
    <text x="716" y="942" font-weight="bold" font-size="11">MINES ANCIENT ICE FROM THE DARK</text>
    <text x="1046" y="924" fill="#6FC3FF">STATUS</text>
    <text x="1046" y="942" font-weight="bold" font-size="10.5">CONCEPT — ICE CONFIRMED, NEAR-TERM</text>
  </g>
</svg>
