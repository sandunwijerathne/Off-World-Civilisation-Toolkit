    <line x1="300" y1="620" x2="716" y2="620" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <line x1="300" y1="530" x2="300" y2="630" stroke-dasharray="4 3"/>
    <line x1="716" y1="480" x2="716" y2="630" stroke-dasharray="4 3"/>
    <text x="508" y="642" text-anchor="middle" font-size="14">WORK ENVELOPE 22.6 m (ARMS EXTENDED)</text>
