    <g><circle cx="804" cy="318" r="12" fill="none" stroke="#6FC3FF"/><text x="804" y="323" text-anchor="middle">6</text></g>
    <g><circle cx="542" cy="650" r="12" fill="none" stroke="#6FC3FF"/><text x="542" y="655" text-anchor="middle">7</text></g>
    <g><circle cx="228" cy="218" r="12" fill="none" stroke="#6FC3FF"/><text x="228" y="223" text-anchor="middle">8</text></g>
