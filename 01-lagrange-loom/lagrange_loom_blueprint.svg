  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- incoming precursor filament (single) -->
    <line x1="60" y1="430" x2="300" y2="430" stroke-width="1.2"/>
    <text x="80" y="415" fill="#6FC3FF" font-size="11" stroke="none">PRECURSOR FILAMENT (IN)</text>

    <!-- outgoing Hoytether ribbon (lattice) -->
    <line x1="560" y1="418" x2="900" y2="418" stroke-width="1.4"/>
    <line x1="560" y1="442" x2="900" y2="442" stroke-width="1.4"/>
    <path d="M 560 418 L 585 442 L 610 418 L 635 442 L 660 418 L 685 442 L 710 418 L 735 442 L 760 418 L 785 442 L 810 418 L 835 442 L 860 418 L 885 442" stroke-width="0.9"/>
    <path d="M 560 442 L 585 418 L 610 442 L 635 418 L 660 442 L 685 418 L 710 442 L 735 418 L 760 442 L 785 418 L 810 442 L 835 418 L 860 442 L 885 418" stroke-width="0.9"/>
    <text x="640" y="470" fill="#6FC3FF" font-size="11" stroke="none">WOVEN HOYTETHER RIBBON (OUT)</text>

    <!-- main hull -->
    <rect x="300" y="340" width="260" height="180" rx="14"/>

    <!-- spool magazine -->
    <circle cx="337" cy="383" r="17"/><circle cx="337" cy="383" r="5"/>
    <circle cx="337" cy="430" r="17"/><circle cx="337" cy="430" r="5"/>
    <circle cx="337" cy="477" r="17"/><circle cx="337" cy="477" r="5"/>

    <!-- spinneret (cutaway) -->
    <circle cx="450" cy="430" r="55"/>
    <circle cx="450" cy="430" r="38" stroke-dasharray="5 4" stroke-width="1.2"/>
    <circle cx="450" cy="430" r="12"/>
    <path d="M 450 392 A 38 38 0 0 1 488 430" stroke="#6FC3FF" stroke-width="3"/>
    <g stroke-width="0.8">
      <line x1="450" y1="375" x2="450" y2="360"/><line x1="450" y1="485" x2="450" y2="500"/>
      <line x1="395" y1="430" x2="380" y2="430"/><line x1="505" y1="430" x2="520" y2="430"/>
    </g>

    <!-- crawler pinch rollers -->
    <circle cx="308" cy="412" r="10"/><circle cx="308" cy="448" r="10"/>
    <circle cx="552" cy="406" r="10"/><circle cx="552" cy="454" r="10"/>

    <!-- weaving arms -->
    <path d="M 560 388 L 630 352 L 700 392" stroke-width="2.5"/>
    <circle cx="630" cy="352" r="7"/>
    <path d="M 700 392 l 14 10 m -14 -10 l 2 18" stroke-width="1.5"/>
    <path d="M 560 472 L 634 506 L 702 468" stroke-width="2.5"/>
    <circle cx="634" cy="506" r="7"/>
    <path d="M 702 468 l 14 -10 m -14 10 l 2 -18" stroke-width="1.5"/>

    <!-- solar array -->
    <line x1="470" y1="340" x2="470" y2="300"/>
    <rect x="360" y="252" width="100" height="46"/>
    <path d="M 385 252 v46 M 410 252 v46 M 435 252 v46 M 360 275 h100" stroke-width="0.8"/>
    <rect x="480" y="252" width="100" height="46"/>
    <path d="M 505 252 v46 M 530 252 v46 M 555 252 v46 M 480 275 h100" stroke-width="0.8"/>

