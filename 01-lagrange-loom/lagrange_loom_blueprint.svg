    <text x="1046" y="831" font-weight="bold">1 : 60 @ A1</text>
    <text x="716" y="862" fill="#6FC3FF">DEPLOYMENT ENVIRONMENT</text>
    <text x="716" y="881" font-weight="bold">LEO TO EARTH-MOON L1/L2, 10-YEAR SERVICE LIFE</text>
    <text x="1046" y="862" fill="#6FC3FF">MASS (DRY)</text>
    <text x="1046" y="881" font-weight="bold">12,000 kg</text>
    <text x="716" y="912" fill="#6FC3FF">FUNCTION</text>
    <text x="716" y="931" font-weight="bold">WEAVES / SPLICES / REPAIRS MOMENTUM-EXCHANGE TETHER WEB</text>
    <text x="1046" y="912" fill="#6FC3FF">STATUS</text>
