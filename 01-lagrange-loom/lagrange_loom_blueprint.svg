<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <text x="50" y="70" fill="#DCEBFA" font-size="30" letter-spacing="4" font-weight="bold">LAGRANGE LOOM — LL-1 "ARANEA"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">ORBITAL TETHER-WEAVING SPACECRAFT · SIDE ELEVATION ON LINE · NETWORK SCHEMATIC · SHEET 1 OF 5</text>
  <text x="1350" y="66" fill="#DCEBFA" font-size="12" text-anchor="end">DESIGNER: W.A. SANDUN PRIYANKARA WIJERATHNE</text>
  <text x="1350" y="84" fill="#6FC3FF" font-size="11" text-anchor="end">sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ======== NETWORK SCHEMATIC INSET (top right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.2">
    <rect x="950" y="140" width="390" height="260" fill="#0E3357" stroke="#6FC3FF"/>
    <text x="966" y="164" fill="#6FC3FF" font-size="12" letter-spacing="2" stroke="none">FIG. B — CISLUNAR NETWORK TOPOLOGY</text>
    <!-- Earth -->
    <circle cx="1015" cy="290" r="30"/>
    <path d="M 990 275 q 12 8 24 2 q 14 -6 24 4 M 995 305 q 14 -6 26 0" stroke-width="0.8"/>
    <!-- LEO rotating tether -->
    <circle cx="1090" cy="290" r="26" stroke-dasharray="4 4" stroke-width="0.8"/>
    <line x1="1072" y1="272" x2="1108" y2="308" stroke-width="1.5"/>
    <path d="M 1104 268 A 26 26 0 0 1 1112 286" stroke="#6FC3FF" marker-end="url(#arrow)" stroke-width="1"/>
    <!-- climber line to L1 -->
    <line x1="1116" y1="290" x2="1210" y2="290" stroke-dasharray="6 4"/>
    <!-- L1 hub -->
    <rect x="1204" y="284" width="12" height="12" fill="#0E3357"/>
    <line x1="1210" y1="278" x2="1210" y2="262" stroke-width="0.8"/>
    <!-- moon-side rotating tether -->
    <circle cx="1252" cy="290" r="20" stroke-dasharray="4 4" stroke-width="0.8"/>
    <line x1="1238" y1="276" x2="1266" y2="304" stroke-width="1.5"/>
    <!-- Moon -->
    <circle cx="1305" cy="290" r="13"/>
    <circle cx="1301" cy="286" r="3" stroke-width="0.7"/>
    <g fill="#DCEBFA" font-size="10" stroke="none">
      <text x="1015" y="338" text-anchor="middle">EARTH</text>
      <text x="1090" y="338" text-anchor="middle">MX TETHER</text>
      <text x="1210" y="256" text-anchor="middle">L1 HUB</text>
      <text x="1305" y="320" text-anchor="middle">MOON</text>
      <text x="1160" y="282" text-anchor="middle" fill="#6FC3FF">CLIMBER LINE</text>
      <text x="966" y="382" fill="#6FC3FF">MOMENTUM FLOW: INBOUND MASS FUNDS OUTBOUND MASS</text>
    </g>
  </g>

