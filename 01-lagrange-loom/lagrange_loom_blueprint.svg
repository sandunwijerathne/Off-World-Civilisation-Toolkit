    <g><circle cx="504" cy="193" r="12" fill="none" stroke="#6FC3FF"/><text x="504" y="198" text-anchor="middle">1</text></g>
    <g><circle cx="672" cy="218" r="12" fill="none" stroke="#6FC3FF"/><text x="672" y="223" text-anchor="middle">2</text></g>
