    <line x1="430" y1="520" x2="430" y2="574"/>
    <path d="M 418 574 q 12 20 24 0" stroke-width="2"/>
    <path d="M 414 574 h 32" stroke-width="1.2"/>
  </g>

  <!-- ======== DETAIL A: lattice close-up ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.4">
    <circle cx="1120" cy="580" r="82" stroke="#6FC3FF"/>
    <line x1="1052" y1="548" x2="1188" y2="548" stroke-width="2"/>
    <line x1="1052" y1="612" x2="1188" y2="612" stroke-width="2"/>
    <path d="M 1052 548 L 1086 612 L 1120 548 L 1154 612 L 1188 548" />
    <path d="M 1052 612 L 1086 548 L 1120 612 L 1154 548" />
    <!-- severed strand -->
    <path d="M 1154 548 L 1171 580" stroke-dasharray="3 3" stroke-width="1"/>
    <path d="M 1160 566 l 8 -6 m -4 12 l 9 -5" stroke="#6FC3FF" stroke-width="1"/>
    <path d="M 1120 548 L 1154 612" stroke="#6FC3FF" stroke-width="2.2"/>
    <text x="1120" y="690" fill="#6FC3FF" font-size="12" text-anchor="middle" stroke="none">DETAIL A — FAILSAFE LATTICE: CUT STRAND SHEDS LOAD</text>
    <line x1="840" y1="442" x2="1048" y2="556" stroke="#6FC3FF" stroke-width="0.9" stroke-dasharray="5 4"/>
  </g>

