    <line x1="1030" y1="740" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="762" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="781" font-size="15" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="762" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="781" font-size="15" font-weight="bold">LL-1-GA-001 · REV A</text>
    <text x="716" y="812" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="831" font-weight="bold">LL-1 "ARANEA" — GENERAL ARRANGEMENT</text>
