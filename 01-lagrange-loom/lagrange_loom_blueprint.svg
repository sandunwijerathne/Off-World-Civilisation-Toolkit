    <rect x="50" y="740" width="620" height="216" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="765" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="774" x2="654" y2="774" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="796">1 — SPINNERET CORE: vacuum braider, extrudes 400 m ribbon per hour</text>
    <text x="66" y="818">2 — TWIN WEAVING ARMS: 7-DOF, splice / knot / tension operations</text>
    <text x="66" y="840">3 — CRAWLER PINCH-ROLLER DRIVE: translates along line, non-abrasive</text>
    <text x="66" y="862">4 — SPOOL MAGAZINE: 3 x 900 kg precursor filament drums (UHMWPE/CNT)</text>
    <text x="66" y="884">5 — SOLAR ARRAY: 22 kW, powers braiding + electrodynamic reboost</text>
    <text x="66" y="906">6 — HOYTETHER RIBBON: multi-line failsafe lattice, see DETAIL A</text>
    <text x="66" y="928">7 — PAYLOAD GRAPPLE BOOM: tip-catch mechanism, 500 kg class</text>
    <text x="66" y="950">8 — FIBRE-OPTIC INTERROGATOR: reads strain map woven into web</text>
  </g>

  <text x="1350" y="730" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

