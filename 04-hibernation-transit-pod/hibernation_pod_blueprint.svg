<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <text x="50" y="70" fill="#DCEBFA" font-size="30" letter-spacing="4" font-weight="bold">HIBERNATION POD — HP-1 "SOMNUS"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">MEDICALLY-INDUCED TORPOR HABITAT · END SECTION · BERTH DETAIL · SHEET 1 OF 5</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ======== END SECTION: 6-berth ring ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- outer hull -->
    <circle cx="430" cy="460" r="300"/>
    <circle cx="430" cy="460" r="290" stroke-width="0.8"/>
    <!-- radiation-shielded core ring -->
    <circle cx="430" cy="460" r="120" stroke-dasharray="6 5" stroke-width="1.2"/>
    <circle cx="430" cy="460" r="95"/>
    <!-- central care spine -->
    <circle cx="430" cy="460" r="40"/>
    <path d="M 430 420 v80 M 390 460 h80 M 402 432 l 56 56 M 402 488 l 56 -56" stroke-width="0.8"/>
    <text x="430" y="464" fill="#6FC3FF" font-size="10" text-anchor="middle" stroke="none">CARE</text>
    <text x="430" y="476" fill="#6FC3FF" font-size="10" text-anchor="middle" stroke="none">SPINE</text>
  </g>

  <!-- 6 berths around the ring -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.6">
    <!-- berth template drawn at 6 angles -->
    <!-- top -->
    <g transform="rotate(0 430 460)">
      <rect x="398" y="150" width="64" height="120" rx="14"/>
      <ellipse cx="430" cy="200" rx="16" ry="26"/>
      <rect x="410" y="238" width="40" height="22" rx="4"/>
      <path d="M 398 175 h-16 M 462 175 h16" stroke-width="1"/>
    </g>
    <g transform="rotate(60 430 460)">
      <rect x="398" y="150" width="64" height="120" rx="14"/>
      <ellipse cx="430" cy="200" rx="16" ry="26"/>
      <rect x="410" y="238" width="40" height="22" rx="4"/>
      <path d="M 398 175 h-16 M 462 175 h16" stroke-width="1"/>
    </g>
    <g transform="rotate(120 430 460)">
      <rect x="398" y="150" width="64" height="120" rx="14"/>
      <ellipse cx="430" cy="200" rx="16" ry="26"/>
      <rect x="410" y="238" width="40" height="22" rx="4"/>
      <path d="M 398 175 h-16 M 462 175 h16" stroke-width="1"/>
    </g>
    <g transform="rotate(180 430 460)">
      <rect x="398" y="150" width="64" height="120" rx="14"/>
      <ellipse cx="430" cy="200" rx="16" ry="26"/>
      <rect x="410" y="238" width="40" height="22" rx="4"/>
      <path d="M 398 175 h-16 M 462 175 h16" stroke-width="1"/>
    </g>
    <g transform="rotate(240 430 460)">
      <rect x="398" y="150" width="64" height="120" rx="14"/>
      <ellipse cx="430" cy="200" rx="16" ry="26"/>
      <rect x="410" y="238" width="40" height="22" rx="4"/>
      <path d="M 398 175 h-16 M 462 175 h16" stroke-width="1"/>
    </g>
    <g transform="rotate(300 430 460)">
      <rect x="398" y="150" width="64" height="120" rx="14"/>
      <ellipse cx="430" cy="200" rx="16" ry="26"/>
      <rect x="410" y="238" width="40" height="22" rx="4"/>
      <path d="M 398 175 h-16 M 462 175 h16" stroke-width="1"/>
    </g>
  </g>
  <!-- "awake" indicator on one berth -->
  <circle cx="430" cy="200" r="34" stroke="#6FC3FF" stroke-width="1.4" fill="none"/>
  <text x="430" y="128" fill="#6FC3FF" font-size="10" text-anchor="middle" stroke="none">1 AWAKE (ROTA)</text>

  <text x="430" y="792" fill="#DCEBFA" font-size="11" text-anchor="middle" stroke="none">END SECTION — SIX BERTHS AROUND SHIELDED CORE</text>

  <!-- ======== BERTH DETAIL (right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <rect x="900" y="200" width="360" height="150" rx="20"/>
    <!-- occupant -->
    <ellipse cx="960" cy="275" rx="22" ry="30"/>
    <path d="M 982 275 h 210" stroke-width="1.2"/>
    <path d="M 982 262 h 200 M 982 288 h 200" stroke-width="0.7" stroke-dasharray="4 4"/>
    <!-- cooling loop coils in lining -->
    <path d="M 905 210 q 20 8 0 16 q -20 8 0 16 q 20 8 0 16 q -20 8 0 16 q 20 8 0 16 q -20 8 0 16 q 20 8 0 16" stroke="#6FC3FF" stroke-width="1" transform="translate(0,4)"/>
    <path d="M 1255 210 q -20 8 0 16 q 20 8 0 16 q -20 8 0 16 q 20 8 0 16 q -20 8 0 16 q 20 8 0 16 q -20 8 0 16" stroke="#6FC3FF" stroke-width="1" transform="translate(0,4)"/>
    <!-- IV line -->
    <path d="M 1120 200 v -30 h 40" stroke-width="1.2"/>
    <rect x="1160" y="158" width="26" height="22"/>
    <!-- monitor cuff -->
    <rect x="1000" y="250" width="18" height="14" stroke-width="1.2"/>
    <path d="M 1000 300 q 6 -10 12 0 q 6 10 12 0" stroke="#6FC3FF" stroke-width="1"/>
  </g>
  <g fill="#DCEBFA" font-size="10" stroke="none">
    <text x="1175" y="152">IV NUTRITION</text>
    <text x="895" y="196">COOLING LOOP LINING</text>
    <text x="1010" y="330">MONITOR CUFF + ECG</text>
  </g>
  <text x="1080" y="376" fill="#DCEBFA" font-size="11" text-anchor="middle" stroke="none">DETAIL A — SINGLE HIBERNATION BERTH (ICU-CLASS)</text>

  <!-- torpor cycle diagram -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.4">
    <rect x="900" y="430" width="360" height="150" fill="#0E3357" stroke="#6FC3FF"/>
    <text x="916" y="454" fill="#6FC3FF" font-size="11" letter-spacing="1" stroke="none">FIG. B — TORPOR CYCLE (CORE TEMP)</text>
    <polyline points="920,540 960,540 1010,505 1180,505 1230,540 1250,540" stroke="#DCEBFA" stroke-width="1.6"/>
    <line x1="920" y1="470" x2="920" y2="560" stroke-width="0.8"/>
    <line x1="920" y1="560" x2="1250" y2="560" stroke-width="0.8"/>
    <g stroke="#6FC3FF" stroke-width="0.7" stroke-dasharray="3 3">
      <line x1="920" y1="505" x2="1250" y2="505"/>
    </g>
    <g fill="#DCEBFA" font-size="9" stroke="none">
      <text x="905" y="544" text-anchor="end">37</text>
      <text x="905" y="509" text-anchor="end">33</text>
      <text x="965" y="575">INDUCE</text>
      <text x="1075" y="575" text-anchor="middle">HOLD (MONTHS)</text>
      <text x="1225" y="575" text-anchor="end">REWARM</text>
    </g>
  </g>

  <!-- ======== CALLOUTS ======== -->
  <g stroke="#6FC3FF" stroke-width="1" fill="none">
    <line x1="404" y1="216" x2="214" y2="238" marker-start="url(#arrow)"/>
    <line x1="430" y1="500" x2="700" y2="642" marker-start="url(#arrow)"/>
    <line x1="470" y1="460" x2="700" y2="472" marker-start="url(#arrow)"/>
    <line x1="1009" y1="257" x2="822" y2="204" marker-start="url(#arrow)"/>
    <line x1="1173" y1="158" x2="822" y2="150" marker-start="url(#arrow)"/>
  </g>
  <g fill="#DCEBFA" font-size="13">
    <g><circle cx="202" cy="230" r="12" fill="none" stroke="#6FC3FF"/><text x="202" y="235" text-anchor="middle">1</text></g>
    <g><circle cx="710" cy="652" r="12" fill="none" stroke="#6FC3FF"/><text x="710" y="657" text-anchor="middle">2</text></g>
    <g><circle cx="712" cy="472" r="12" fill="none" stroke="#6FC3FF"/><text x="712" y="477" text-anchor="middle">3</text></g>
    <g><circle cx="810" cy="204" r="12" fill="none" stroke="#6FC3FF"/><text x="810" y="209" text-anchor="middle">4</text></g>
    <g><circle cx="810" cy="150" r="12" fill="none" stroke="#6FC3FF"/><text x="810" y="155" text-anchor="middle">5</text></g>
  </g>

  <!-- dimension -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="130" y1="460" x2="730" y2="460" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <line x1="130" y1="160" x2="130" y2="470" stroke-dasharray="4 3" stroke-width="0.6"/>
    <line x1="730" y1="160" x2="730" y2="470" stroke-dasharray="4 3" stroke-width="0.6"/>
    <text x="430" y="452" text-anchor="middle" font-size="14" fill="#DCEBFA">MODULE DIAMETER 6.0 m</text>
  </g>

  <!-- ======== PARTS LIST ======== -->
  <g font-size="13" fill="#DCEBFA">
    <rect x="50" y="810" width="620" height="146" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="835" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="844" x2="654" y2="844" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="864">1 — HIBERNATION BERTHS (x6): ICU-class torpor pods on staggered rota</text>
    <text x="66" y="884">2 — SHIELDED CORE: water + polyethylene, doubles as radiation mass</text>
    <text x="66" y="904">3 — AUTOMATED CARE SPINE: monitoring, dosing, abort-to-rewarm logic</text>
    <text x="66" y="924">4 — MONITOR CUFF: core temp, ECG, blood chemistry, EEG per berth</text>
    <text x="66" y="944">5 — IV NUTRITION + THERMAL LOOP: parenteral feed, cooling/rewarming</text>
  </g>

  <text x="1350" y="800" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

  <!-- ======== TITLE BLOCK ======== -->
  <g font-size="12" fill="#DCEBFA">
    <rect x="700" y="810" width="650" height="146" fill="#0E3357" stroke="#DCEBFA" stroke-width="1.5"/>
    <line x1="700" y1="844" x2="1350" y2="844" stroke="#DCEBFA"/>
    <line x1="700" y1="878" x2="1350" y2="878" stroke="#DCEBFA"/>
    <line x1="700" y1="912" x2="1350" y2="912" stroke="#DCEBFA"/>
    <line x1="1030" y1="810" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="830" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="840" font-size="13" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="830" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="840" font-size="13" font-weight="bold">HP-1-GA-001 · REV A</text>
    <text x="716" y="866" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="876" font-weight="bold" font-size="11">HP-1 "SOMNUS" — GENERAL ARRANGEMENT</text>
    <text x="1046" y="866" fill="#6FC3FF">CREW</text>
    <text x="1046" y="876" font-weight="bold">6 (STAGGERED)</text>
    <text x="716" y="900" fill="#6FC3FF">DEPLOYMENT ENVIRONMENT</text>
    <text x="716" y="910" font-weight="bold" font-size="11">EARTH-MARS TRANSIT, 6-9 MONTH COAST</text>
    <text x="1046" y="900" fill="#6FC3FF">STATUS</text>
    <text x="1046" y="910" font-weight="bold" font-size="10.5">CONCEPT — MEDICINE IS FRONTIER</text>
    <text x="716" y="934" fill="#6FC3FF">FUNCTION</text>
    <text x="716" y="944" font-weight="bold" font-size="11">TORPOR TRANSIT: CUTS CONSUMABLES + HAB MASS</text>
    <text x="1046" y="934" fill="#6FC3FF">MASS TARGET</text>
    <text x="1046" y="944" font-weight="bold">~HALF ACTIVE HAB</text>
  </g>
</svg>
