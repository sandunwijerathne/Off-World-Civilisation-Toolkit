<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <text x="50" y="70" fill="#DCEBFA" font-size="27" letter-spacing="3" font-weight="bold">TERRAFORMING SEEDER — TS-1 "DEMETER"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">MARTIAN SOLAR SEEDING DRONE · PLAN + SIDE VIEW · BIO-PAYLOAD DETAIL · SHEET 1 OF 5</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ======== PLAN VIEW (top): solar drone from above ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- fuselage -->
    <path d="M 430 200 q 20 -10 40 0 l 0 200 q -20 12 -40 0 z"/>
    <!-- long solar wings -->
    <rect x="130" y="250" width="300" height="46"/>
    <rect x="470" y="250" width="300" height="46"/>
    <g stroke-width="0.7">
      <path d="M 130 273 h300 M 470 273 h300"/>
      <path d="M 170 250 v46 M 210 250 v46 M 250 250 v46 M 290 250 v46 M 330 250 v46 M 370 250 v46 M 410 250 v46"/>
      <path d="M 510 250 v46 M 550 250 v46 M 590 250 v46 M 630 250 v46 M 670 250 v46 M 710 250 v46 M 750 250 v46"/>
    </g>
    <text x="270" y="240" fill="#6FC3FF" font-size="10" text-anchor="middle" stroke="none">SOLAR ARRAY WING (PV)</text>
    <!-- big slow rotors (thin-air) at wingtips -->
    <circle cx="130" cy="273" r="46" stroke-dasharray="3 5" stroke-width="1"/>
    <line x1="90" y1="273" x2="170" y2="273" stroke-width="1.4"/>
    <line x1="130" y1="233" x2="130" y2="313" stroke-width="1.4"/>
    <circle cx="770" cy="273" r="46" stroke-dasharray="3 5" stroke-width="1"/>
    <line x1="730" y1="273" x2="810" y2="273" stroke-width="1.4"/>
    <line x1="770" y1="233" x2="770" y2="313" stroke-width="1.4"/>
    <text x="130" y="340" fill="#6FC3FF" font-size="9" text-anchor="middle" stroke="none">LARGE SLOW ROTOR</text>
    <!-- tail -->
    <path d="M 435 400 l -30 40 M 465 400 l 30 40"/>
    <!-- dispenser bay marker -->
    <rect x="438" y="330" width="24" height="40" stroke="#6FC3FF" stroke-width="1.2"/>
    <text x="500" y="360" fill="#6FC3FF" font-size="9" stroke="none">DISPENSER BAY</text>
  </g>

  <!-- ======== SIDE VIEW seeding a microhabitat (center-bottom) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- ground / canyon shelter -->
    <path d="M 100 620 h 220 q 40 0 60 -40 l 20 -30 q 20 40 60 40 h 240" stroke-width="1.2"/>
    <g stroke-width="0.6">
      <line x1="120" y1="620" x2="110" y2="632"/><line x1="160" y1="620" x2="150" y2="632"/>
      <line x1="200" y1="620" x2="190" y2="632"/><line x1="600" y1="620" x2="590" y2="632"/>
      <line x1="640" y1="620" x2="630" y2="632"/><line x1="680" y1="620" x2="670" y2="632"/>
    </g>
    <text x="120" y="648" fill="#6FC3FF" font-size="9" stroke="none">SHELTERED MICROHABITAT (CANYON FLOOR)</text>

    <!-- drone in flight (side) -->
    <path d="M 300 470 q 14 -8 28 0 l 90 0 q 14 8 0 16 l -90 0 q -14 8 -28 0 z"/>
    <line x1="250" y1="470" x2="470" y2="470" stroke-width="1.6"/>
    <ellipse cx="360" cy="452" rx="40" ry="6"/>
    <!-- seed spray -->
    <g stroke="#6FC3FF" stroke-width="1">
      <path d="M 380 486 l -6 40" marker-end="url(#arrow)"/>
      <path d="M 400 486 l 0 44" marker-end="url(#arrow)"/>
      <path d="M 420 486 l 6 40" marker-end="url(#arrow)"/>
    </g>
    <text x="440" y="520" fill="#6FC3FF" font-size="9" stroke="none">METERED BIO-SEED RELEASE</text>
    <!-- seeded patch -->
    <path d="M 370 616 q 30 -10 60 0" stroke="#6FC3FF" stroke-width="2"/>
    <path d="M 378 610 l 2 -8 M 392 608 l 1 -9 M 408 608 l 0 -9 M 422 610 l -1 -8" stroke="#6FC3FF" stroke-width="0.8"/>
  </g>

  <!-- ======== SEED-AND-MONITOR CYCLE INSET (top right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.2">
    <rect x="1000" y="140" width="340" height="230" fill="#0E3357" stroke="#6FC3FF"/>
    <text x="1016" y="164" fill="#6FC3FF" font-size="12" letter-spacing="1" stroke="none">FIG. B — SEED &amp; MONITOR LOOP</text>
    <circle cx="1170" cy="260" r="70" stroke-dasharray="5 4" stroke-width="0.8"/>
    <g fill="#DCEBFA" font-size="9" stroke="none">
      <text x="1170" y="205" text-anchor="middle">SURVEY SITE</text>
      <text x="1245" y="264" text-anchor="middle">SEED</text>
      <text x="1170" y="330" text-anchor="middle">MONITOR GASES</text>
      <text x="1092" y="264" text-anchor="middle">CULL/RE-SEED</text>
    </g>
    <g stroke="#6FC3FF" stroke-width="1">
      <path d="M 1205 216 a 70 70 0 0 1 20 40" marker-end="url(#arrow)"/>
      <path d="M 1222 292 a 70 70 0 0 1 -40 34" marker-end="url(#arrow)"/>
      <path d="M 1140 324 a 70 70 0 0 1 -44 -30" marker-end="url(#arrow)"/>
      <path d="M 1104 224 a 70 70 0 0 1 42 -30" marker-end="url(#arrow)"/>
    </g>
  </g>

  <!-- ======== DETAIL A: refrigerated bio-payload ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.4">
    <circle cx="1120" cy="580" r="86" stroke="#6FC3FF"/>
    <rect x="1074" y="536" width="92" height="88" rx="6"/>
    <!-- vials -->
    <rect x="1086" y="552" width="14" height="40" rx="3"/>
    <rect x="1106" y="552" width="14" height="40" rx="3"/>
    <rect x="1126" y="552" width="14" height="40" rx="3"/>
    <rect x="1146" y="552" width="14" height="40" rx="3"/>
    <path d="M 1086 566 h14 M 1106 566 h14 M 1126 566 h14 M 1146 566 h14" stroke-width="0.6"/>
    <!-- cooling coil -->
    <path d="M 1078 604 q 6 -8 0 -12 q -6 -8 0 -12" stroke="#6FC3FF" stroke-width="1"/>
    <!-- dispense nozzle -->
    <path d="M 1120 624 l -6 14 h12 z"/>
    <g fill="#DCEBFA" font-size="8.5" stroke="none">
      <text x="1120" y="548" text-anchor="middle">DORMANT STRAIN VIALS</text>
      <text x="1120" y="612" text-anchor="middle" font-size="8">REFRIG. HOLD</text>
    </g>
    <text x="1120" y="694" fill="#6FC3FF" font-size="12" text-anchor="middle" stroke="none">DETAIL A — REFRIGERATED BIO-PAYLOAD</text>
    <line x1="450" y1="350" x2="1034" y2="560" stroke="#6FC3FF" stroke-width="0.9" stroke-dasharray="5 4"/>
  </g>

  <!-- ======== CALLOUTS ======== -->
  <g stroke="#6FC3FF" stroke-width="1" fill="none">
    <line x1="270" y1="250" x2="220" y2="150" marker-start="url(#arrow)"/>
    <line x1="130" y1="319" x2="180" y2="410" marker-start="url(#arrow)"/>
    <line x1="450" y1="350" x2="560" y2="150" marker-start="url(#arrow)"/>
    <line x1="400" y1="530" x2="520" y2="700" marker-start="url(#arrow)"/>
    <line x1="400" y1="616" x2="640" y2="700" marker-start="url(#arrow)"/>
  </g>
  <g fill="#DCEBFA" font-size="13">
    <g><circle cx="212" cy="142" r="12" fill="none" stroke="#6FC3FF"/><text x="212" y="147" text-anchor="middle">1</text></g>
    <g><circle cx="186" cy="422" r="12" fill="none" stroke="#6FC3FF"/><text x="186" y="427" text-anchor="middle">2</text></g>
    <g><circle cx="568" cy="142" r="12" fill="none" stroke="#6FC3FF"/><text x="568" y="147" text-anchor="middle">3</text></g>
    <g><circle cx="520" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="520" y="717" text-anchor="middle">4</text></g>
    <g><circle cx="640" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="640" y="717" text-anchor="middle">5</text></g>
  </g>

  <!-- dimension -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="90" y1="360" x2="810" y2="360" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <line x1="90" y1="273" x2="90" y2="370" stroke-dasharray="4 3" stroke-width="0.6"/>
    <line x1="810" y1="273" x2="810" y2="370" stroke-dasharray="4 3" stroke-width="0.6"/>
    <text x="450" y="382" text-anchor="middle" font-size="14">WINGSPAN 24 m (BROAD FOR THIN AIR)</text>
  </g>

  <!-- ======== PARTS LIST ======== -->
  <g font-size="13" fill="#DCEBFA">
    <rect x="50" y="760" width="620" height="196" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="785" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="794" x2="654" y2="794" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="814">1 — SOLAR ARRAY WINGS: broad PV, month-scale endurance in thin air</text>
    <text x="66" y="834">2 — LARGE SLOW ROTORS: sized for 1% Earth atmosphere (Ingenuity-class)</text>
    <text x="66" y="854">3 — DISPENSER BAY: metered release of bio-seed over surveyed sites</text>
    <text x="66" y="874">4 — REFRIGERATED BIO-PAYLOAD: dormant engineered strains, see DETAIL A</text>
    <text x="66" y="894">5 — SEEDED MICROHABITAT: sheltered site, monitored + re-seeded (FIG. B)</text>
    <text x="66" y="928" font-size="11" fill="#6FC3FF">NOTE: OPEN RELEASE IS A SOCIETAL DECISION, NOT AN ENGINEERING ONE</text>
  </g>

  <text x="1350" y="750" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

  <!-- ======== TITLE BLOCK ======== -->
  <g font-size="12" fill="#DCEBFA">
    <rect x="700" y="760" width="650" height="196" fill="#0E3357" stroke="#DCEBFA" stroke-width="1.5"/>
    <line x1="700" y1="804" x2="1350" y2="804" stroke="#DCEBFA"/>
    <line x1="700" y1="848" x2="1350" y2="848" stroke="#DCEBFA"/>
    <line x1="700" y1="902" x2="1350" y2="902" stroke="#DCEBFA"/>
    <line x1="1030" y1="760" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="780" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="798" font-size="13" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="780" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="798" font-size="13" font-weight="bold">TS-1-GA-001 · REV A</text>
    <text x="716" y="824" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="842" font-weight="bold" font-size="11">TS-1 "DEMETER" — GENERAL ARRANGEMENT</text>
    <text x="1046" y="824" fill="#6FC3FF">ENVIRONMENT</text>
    <text x="1046" y="842" font-weight="bold" font-size="11">MARS, THIN CO2 AIR</text>
    <text x="716" y="868" fill="#6FC3FF">DEPLOYMENT</text>
    <text x="716" y="886" font-weight="bold" font-size="11">SHELTERED MARTIAN MICROHABITATS</text>
    <text x="1046" y="868" fill="#6FC3FF">PAYLOAD</text>
    <text x="1046" y="886" font-weight="bold" font-size="11">ENGINEERED MICROBES</text>
    <text x="716" y="924" fill="#6FC3FF">FUNCTION</text>
    <text x="716" y="942" font-weight="bold" font-size="11">SEEDS + MONITORS LOCAL BIOLOGICAL FOOTHOLDS</text>
    <text x="1046" y="924" fill="#6FC3FF">STATUS</text>
    <text x="1046" y="942" font-weight="bold" font-size="10">CONCEPT — HARDWARE NEAR, ETHICS OPEN</text>
  </g>
</svg>
