<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>

  <!-- Sheet frame -->
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <!-- Header -->
  <text x="50" y="70" fill="#DCEBFA" font-size="30" letter-spacing="4" font-weight="bold">REGOLITH FORGE CRAWLER — RFC-1 "TERRAMOTHER"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">AUTONOMOUS IN-SITU CONSTRUCTION MACHINE · SIDE ELEVATION · SECTION A-A · SHEET 1 OF 4</text>
  <text x="1350" y="66" fill="#DCEBFA" font-size="12" text-anchor="end">DESIGNER: W.A. SANDUN PRIYANKARA WIJERATHNE</text>
  <text x="1350" y="84" fill="#6FC3FF" font-size="11" text-anchor="end">sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ============ MAIN SIDE ELEVATION ============ -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">

    <!-- Ground line -->
    <line x1="80" y1="640" x2="1000" y2="640" stroke-width="1.2"/>
    <g stroke-width="0.8">
      <line x1="90" y1="640" x2="80" y2="652"/><line x1="120" y1="640" x2="110" y2="652"/>
      <line x1="150" y1="640" x2="140" y2="652"/><line x1="180" y1="640" x2="170" y2="652"/>
      <line x1="820" y1="640" x2="810" y2="652"/><line x1="850" y1="640" x2="840" y2="652"/>
      <line x1="880" y1="640" x2="870" y2="652"/><line x1="910" y1="640" x2="900" y2="652"/>
      <line x1="940" y1="640" x2="930" y2="652"/><line x1="970" y1="640" x2="960" y2="652"/>
    </g>

    <!-- Track assemblies (two bogies) -->
    <g>
      <rect x="200" y="580" width="220" height="55" rx="27"/>
      <circle cx="235" cy="607" r="17"/><circle cx="310" cy="607" r="17"/><circle cx="385" cy="607" r="17"/>
      <circle cx="235" cy="607" r="5"/><circle cx="310" cy="607" r="5"/><circle cx="385" cy="607" r="5"/>
      <rect x="500" y="580" width="220" height="55" rx="27"/>
      <circle cx="535" cy="607" r="17"/><circle cx="610" cy="607" r="17"/><circle cx="685" cy="607" r="17"/>
      <circle cx="535" cy="607" r="5"/><circle cx="610" cy="607" r="5"/><circle cx="685" cy="607" r="5"/>
    </g>

    <!-- Main hull -->
    <path d="M 190 560 L 190 420 L 240 380 L 640 380 L 700 400 L 740 400 L 740 560 Z"/>

    <!-- Intake maw (front left) -->
    <path d="M 190 560 L 120 620 L 120 560 L 155 500 L 190 480"/>
    <circle cx="150" cy="565" r="34"/>
    <g stroke-width="1.2">
      <line x1="150" y1="531" x2="150" y2="599"/>
      <line x1="116" y1="565" x2="184" y2="565"/>
      <line x1="126" y1="541" x2="174" y2="589"/>
      <line x1="126" y1="589" x2="174" y2="541"/>
    </g>
    <!-- bucket teeth -->
    <path d="M 118 600 l -10 8 M 122 585 l -11 6 M 120 570 l -12 3" stroke-width="1.5"/>

    <!-- Hopper / separator column (cutaway) -->
    <path d="M 250 380 L 250 560 M 250 430 L 340 430 M 250 500 L 340 500" stroke-dasharray="6 4" stroke-width="1.2"/>
    <path d="M 260 445 l 20 12 l -20 12 M 295 445 l 20 12 l -20 12" stroke-width="1"/>
    <rect x="255" y="510" width="80" height="40" stroke-width="1.2"/>
    <path d="M 260 518 h 70 M 260 528 h 70 M 260 538 h 70" stroke-width="0.7"/>

    <!-- Plasma sinter kiln (center, cutaway circle) -->
    <circle cx="450" cy="480" r="62"/>
    <circle cx="450" cy="480" r="44" stroke-dasharray="5 4" stroke-width="1.2"/>
    <circle cx="450" cy="480" r="16"/>
    <path d="M 450 464 A 16 16 0 0 1 450 496" stroke-width="3" stroke="#6FC3FF"/>
    <g stroke-width="0.8">
      <line x1="450" y1="418" x2="450" y2="436"/><line x1="450" y1="524" x2="450" y2="542"/>
      <line x1="388" y1="480" x2="406" y2="480"/><line x1="494" y1="480" x2="512" y2="480"/>
    </g>

    <!-- Reactor module (rear) -->
    <rect x="600" y="440" width="110" height="110" rx="8"/>
    <circle cx="655" cy="495" r="30"/>
    <path d="M 655 465 v60 M 625 495 h60 M 634 474 l 42 42 M 634 516 l 42 -42" stroke-width="1"/>
    <!-- Radiator fins -->
    <g stroke-width="1.5">
      <line x1="740" y1="420" x2="800" y2="400"/><line x1="740" y1="445" x2="805" y2="430"/>
      <line x1="740" y1="470" x2="808" y2="460"/><line x1="740" y1="495" x2="806" y2="492"/>
    </g>

    <!-- Sensor / AI mast -->
    <line x1="300" y1="380" x2="300" y2="300"/>
    <rect x="278" y="262" width="44" height="38" rx="6"/>
    <circle cx="300" cy="281" r="9"/>
    <path d="M 322 270 l 26 -14 M 322 292 l 26 14" stroke-width="1"/>

    <!-- Extrusion gantry arm printing dome -->
    <path d="M 700 400 L 830 330 L 930 380" stroke-width="2.5"/>
    <circle cx="830" cy="330" r="8"/>
    <path d="M 930 380 L 930 430" stroke-width="2.5"/>
    <path d="M 918 430 h 24 l -6 22 h -12 Z"/>
    <!-- printed dome courses -->
    <path d="M 860 640 A 95 95 0 0 1 1050 640" stroke-width="2"/>
    <path d="M 875 640 A 80 80 0 0 1 1035 640" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M 890 640 A 65 65 0 0 1 1020 640" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- fresh bead -->
    <path d="M 924 452 q 6 30 12 46" stroke="#6FC3FF" stroke-width="3"/>
  </g>

  <!-- ============ CALLOUT LEADERS ============ -->
  <g stroke="#6FC3FF" stroke-width="1" fill="none">
    <line x1="150" y1="531" x2="105" y2="470" marker-start="url(#arrow)"/>
    <line x1="295" y1="457" x2="220" y2="330" marker-start="url(#arrow)"/>
    <line x1="450" y1="418" x2="480" y2="240" marker-start="url(#arrow)"/>
    <line x1="655" y1="440" x2="672" y2="230" marker-start="url(#arrow)"/>
    <line x1="300" y1="262" x2="230" y2="215" marker-start="url(#arrow)"/>
    <line x1="830" y1="322" x2="850" y2="230" marker-start="url(#arrow)"/>
    <line x1="955" y1="545" x2="1060" y2="500" marker-start="url(#arrow)"/>
    <line x1="800" y1="400" x2="1010" y2="330" marker-start="url(#arrow)"/>
  </g>
  <g fill="#DCEBFA" font-size="13">
    <g><circle cx="95" cy="460" r="12" fill="none" stroke="#6FC3FF"/><text x="95" y="465" text-anchor="middle">1</text></g>
    <g><circle cx="212" cy="320" r="12" fill="none" stroke="#6FC3FF"/><text x="212" y="325" text-anchor="middle">2</text></g>
    <g><circle cx="484" cy="228" r="12" fill="none" stroke="#6FC3FF"/><text x="484" y="233" text-anchor="middle">3</text></g>
    <g><circle cx="676" cy="218" r="12" fill="none" stroke="#6FC3FF"/><text x="676" y="223" text-anchor="middle">4</text></g>
    <g><circle cx="220" cy="205" r="12" fill="none" stroke="#6FC3FF"/><text x="220" y="210" text-anchor="middle">5</text></g>
    <g><circle cx="858" cy="220" r="12" fill="none" stroke="#6FC3FF"/><text x="858" y="225" text-anchor="middle">6</text></g>
    <g><circle cx="1072" cy="495" r="12" fill="none" stroke="#6FC3FF"/><text x="1072" y="500" text-anchor="middle">7</text></g>
    <g><circle cx="1022" cy="325" r="12" fill="none" stroke="#6FC3FF"/><text x="1022" y="330" text-anchor="middle">8</text></g>
  </g>

  <!-- Dimension line: overall length -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="120" y1="700" x2="955" y2="700" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <line x1="120" y1="640" x2="120" y2="710" stroke-dasharray="4 3"/>
    <line x1="955" y1="640" x2="955" y2="710" stroke-dasharray="4 3"/>
    <text x="537" y="722" text-anchor="middle" font-size="14">OVERALL LENGTH 18.40 m (INCL. GANTRY, STOWED)</text>
  </g>
  <!-- Dimension: height -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="1090" y1="262" x2="1090" y2="640" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="1105" y="455" font-size="14" transform="rotate(90 1105 455)">MAST HEIGHT 7.90 m</text>
  </g>

  <!-- ============ PARTS LIST ============ -->
  <g font-size="13" fill="#DCEBFA">
    <rect x="50" y="740" width="620" height="216" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="765" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="774" x2="654" y2="774" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="796">1 — ROTARY INTAKE MAW: counter-rotating tungsten drums, 4.2 t/hr regolith</text>
    <text x="66" y="818">2 — ELECTROSTATIC SEPARATOR STACK: sorts ilmenite / silicates / volatiles</text>
    <text x="66" y="840">3 — PLASMA SINTER KILN: 1,600°C microwave-plasma core, zero binder needed</text>
    <text x="66" y="862">4 — KILOPOWER FISSION MODULE: 40 kWe, 12-yr service life, passive cooling</text>
    <text x="66" y="884">5 — AI FOREMAN CORE: onboard autonomy, terrain LIDAR, build-plan solver</text>
    <text x="66" y="906">6 — 3-AXIS EXTRUSION GANTRY: 9 m reach, prints 30 cm structural courses</text>
    <text x="66" y="928">7 — HABITAT DOME (PRODUCT): sintered basalt shell, 60 cm radiation wall</text>
    <text x="66" y="950">8 — DEPLOYABLE RADIATOR ARRAY: rejects 120 kWt waste heat to sky</text>
  </g>

  <text x="1350" y="730" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

  <!-- ============ TITLE BLOCK ============ -->
  <g font-size="12" fill="#DCEBFA">
    <rect x="700" y="740" width="650" height="216" fill="#0E3357" stroke="#DCEBFA" stroke-width="1.5"/>
    <line x1="700" y1="790" x2="1350" y2="790" stroke="#DCEBFA"/>
    <line x1="700" y1="840" x2="1350" y2="840" stroke="#DCEBFA"/>
    <line x1="700" y1="890" x2="1350" y2="890" stroke="#DCEBFA"/>
    <line x1="1030" y1="740" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="762" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="781" font-size="15" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="762" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="781" font-size="15" font-weight="bold">RFC-1-GA-001 · REV A</text>
    <text x="716" y="812" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="831" font-weight="bold">RFC-1 "TERRAMOTHER" — GENERAL ARRANGEMENT</text>
    <text x="1046" y="812" fill="#6FC3FF">SCALE</text>
    <text x="1046" y="831" font-weight="bold">1 : 75 @ A1</text>
    <text x="716" y="862" fill="#6FC3FF">DEPLOYMENT ENVIRONMENT</text>
    <text x="716" y="881" font-weight="bold">MARS / LUNA / REGOLITH BODIES, -120°C TO +40°C</text>
    <text x="1046" y="862" fill="#6FC3FF">MASS (DRY)</text>
    <text x="1046" y="881" font-weight="bold">26,300 kg</text>
    <text x="716" y="912" fill="#6FC3FF">OUTPUT CAPACITY</text>
    <text x="716" y="931" font-weight="bold">ONE 8 m HABITAT DOME PER 21 SOLS, FULLY AUTONOMOUS</text>
    <text x="1046" y="912" fill="#6FC3FF">STATUS</text>
    <text x="1046" y="931" font-weight="bold">CONCEPT — DOES NOT EXIST (YET)</text>
  </g>
</svg>
