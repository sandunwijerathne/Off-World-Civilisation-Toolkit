<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="warrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#DCEBFA"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <text x="50" y="70" fill="#DCEBFA" font-size="30" letter-spacing="4" font-weight="bold">BEAM-RIDER PROBE — BR-1 "SAGITTA"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">GRAM-SCALE LASER-PUSHED LIGHTSAIL · SAIL PLAN VIEW · BEAM-RIDING SECTION · SHEET 1 OF 5</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ======== SAIL PLAN VIEW (left) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <circle cx="360" cy="430" r="180"/>
    <circle cx="360" cy="430" r="172" stroke-width="0.8"/>
    <circle cx="360" cy="430" r="90" stroke-dasharray="5 4" stroke-width="1"/>
    <!-- radial ribs -->
    <g stroke-width="1">
      <line x1="360" y1="250" x2="360" y2="610"/>
      <line x1="180" y1="430" x2="540" y2="430"/>
      <line x1="233" y1="303" x2="487" y2="557"/>
      <line x1="233" y1="557" x2="487" y2="303"/>
    </g>
    <!-- spin arrow -->
    <path d="M 462 328 A 145 145 0 0 1 505 430" stroke="#6FC3FF" stroke-width="1.4" marker-end="url(#arrow)"/>
    <text x="522" y="352" fill="#6FC3FF" font-size="11" stroke="none">SPIN 1 Hz</text>
    <!-- StarChip at vertex -->
    <rect x="345" y="415" width="30" height="30"/>
    <rect x="351" y="421" width="18" height="18" stroke-width="1"/>
  </g>

  <!-- ======== BEAM-RIDING SECTION VIEW (center-right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- laser wavefronts from below -->
    <g stroke-width="0.9" stroke-dasharray="7 5">
      <path d="M 640 700 Q 760 680 880 700"/>
      <path d="M 650 640 Q 760 622 870 640"/>
      <path d="M 660 580 Q 760 564 860 580"/>
    </g>
    <g stroke-width="1">
      <line x1="700" y1="710" x2="722" y2="560" marker-end="url(#warrow)"/>
      <line x1="760" y1="715" x2="760" y2="552" marker-end="url(#warrow)"/>
      <line x1="820" y1="710" x2="798" y2="560" marker-end="url(#warrow)"/>
    </g>
    <text x="640" y="742" fill="#6FC3FF" font-size="11" stroke="none">BEAM 100 GW · 1064 nm PHASED ARRAY</text>
    <!-- conical sail cross-section (concave to beam) -->
    <path d="M 640 500 Q 760 545 880 500" stroke-width="2.5"/>
    <path d="M 640 500 Q 760 538 880 500" stroke-width="1" stroke-dasharray="4 3"/>
    <!-- chip behind vertex -->
    <rect x="752" y="512" width="16" height="12"/>
    <!-- restoring force arrows -->
    <path d="M 668 494 l -14 -22" stroke="#6FC3FF" stroke-width="1.2" marker-end="url(#arrow)"/>
    <path d="M 852 494 l 14 -22" stroke="#6FC3FF" stroke-width="1.2" marker-end="url(#arrow)"/>
    <path d="M 760 508 l 0 -60" stroke="#6FC3FF" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="774" y="452" fill="#6FC3FF" font-size="11" stroke="none">THRUST &gt;10,000 g</text>
    <text x="620" y="404" fill="#DCEBFA" font-size="11" stroke="none">SECTION C-C — PASSIVE BEAM-RIDING FIGURE</text>
    <path d="M 640 500 l -18 0 M 880 500 l 18 0" stroke-width="0.8"/>
  </g>

  <!-- ======== MISSION PROFILE INSET (top right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.2">
    <rect x="950" y="140" width="390" height="240" fill="#0E3357" stroke="#6FC3FF"/>
    <text x="966" y="164" fill="#6FC3FF" font-size="12" letter-spacing="2" stroke="none">FIG. B — MISSION PROFILE</text>
    <!-- Earth + array -->
    <circle cx="1000" cy="290" r="20"/>
    <path d="M 990 268 l 8 -12 h 4 l 8 12" stroke-width="1"/>
    <!-- beam cone -->
    <path d="M 1006 260 L 1120 234 M 1006 264 L 1120 246" stroke-dasharray="4 3" stroke-width="0.8"/>
    <!-- probe -->
    <path d="M 1120 240 l 14 -3 l -3 8 z" fill="#DCEBFA"/>
    <line x1="1140" y1="240" x2="1250" y2="240" stroke-dasharray="2 5" stroke-width="0.9"/>
    <!-- target star + planet -->
    <circle cx="1284" cy="240" r="12"/>
    <path d="M 1284 222 v-8 M 1284 258 v8 M 1266 240 h-8 M 1302 240 h8" stroke-width="0.8"/>
    <circle cx="1310" cy="252" r="4"/>
    <g fill="#DCEBFA" font-size="10" stroke="none">
      <text x="1000" y="330" text-anchor="middle">EARTH ARRAY</text>
      <text x="1063" y="222">BOOST: MINUTES</text>
      <text x="1195" y="230" text-anchor="middle">COAST: 20 YEARS @ 0.2c</text>
      <text x="1284" y="285" text-anchor="middle">PROXIMA b</text>
      <text x="966" y="358" fill="#6FC3FF">DISTANCE 4.37 ly · FLYBY, NO DECELERATION</text>
    </g>
  </g>

  <!-- ======== DETAIL A: StarChip layout ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.4">
    <circle cx="1120" cy="560" r="82" stroke="#6FC3FF"/>
    <rect x="1066" y="512" width="108" height="96" rx="4"/>
    <rect x="1072" y="518" width="18" height="18"/><rect x="1150" y="518" width="18" height="18"/>
    <rect x="1072" y="584" width="18" height="18"/><rect x="1150" y="584" width="18" height="18"/>
    <rect x="1102" y="540" width="36" height="24"/>
    <circle cx="1120" cy="586" r="8"/>
    <g fill="#DCEBFA" font-size="9" stroke="none">
      <text x="1120" y="533" text-anchor="middle">CAMERAS x4</text>
      <text x="1120" y="556" text-anchor="middle">CPU</text>
      <text x="1120" y="620" text-anchor="middle" font-size="8.5">COMMS LASER 1 W</text>
    </g>
    <text x="1120" y="672" fill="#6FC3FF" font-size="12" text-anchor="middle" stroke="none">DETAIL A — STARCHIP WAFER, 2 g PAYLOAD</text>
    <line x1="375" y1="430" x2="1038" y2="546" stroke="#6FC3FF" stroke-width="0.9" stroke-dasharray="5 4"/>
  </g>

  <!-- ======== CALLOUTS ======== -->
  <g stroke="#6FC3FF" stroke-width="1" fill="none">
    <line x1="266" y1="285" x2="205" y2="220" marker-start="url(#arrow)"/>
    <line x1="360" y1="415" x2="288" y2="700" marker-start="url(#arrow)"/>
    <line x1="452" y1="536" x2="520" y2="690" marker-start="url(#arrow)"/>
    <line x1="540" y1="430" x2="592" y2="300" marker-start="url(#arrow)"/>
    <line x1="880" y1="500" x2="930" y2="452" marker-start="url(#arrow)"/>
    <line x1="760" y1="700" x2="905" y2="742" marker-start="url(#arrow)"/>
    <line x1="640" y1="500" x2="586" y2="470" marker-start="url(#arrow)"/>
  </g>
  <g fill="#DCEBFA" font-size="13">
    <g><circle cx="196" cy="212" r="12" fill="none" stroke="#6FC3FF"/><text x="196" y="217" text-anchor="middle">1</text></g>
    <g><circle cx="283" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="283" y="717" text-anchor="middle">2</text></g>
    <g><circle cx="527" cy="702" r="12" fill="none" stroke="#6FC3FF"/><text x="527" y="707" text-anchor="middle">3</text></g>
    <g><circle cx="598" cy="290" r="12" fill="none" stroke="#6FC3FF"/><text x="598" y="295" text-anchor="middle">4</text></g>
    <g><circle cx="940" cy="444" r="12" fill="none" stroke="#6FC3FF"/><text x="940" y="449" text-anchor="middle">5</text></g>
    <g><circle cx="917" cy="750" r="12" fill="none" stroke="#6FC3FF"/><text x="917" y="755" text-anchor="middle">6</text></g>
    <g><circle cx="576" cy="462" r="12" fill="none" stroke="#6FC3FF"/><text x="576" y="467" text-anchor="middle">7</text></g>
  </g>

  <!-- dimension -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="180" y1="660" x2="540" y2="660" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <line x1="180" y1="430" x2="180" y2="670" stroke-dasharray="4 3" stroke-width="0.7"/>
    <line x1="540" y1="430" x2="540" y2="670" stroke-dasharray="4 3" stroke-width="0.7"/>
    <text x="360" y="684" text-anchor="middle" font-size="14">SAIL DIAMETER 4.10 m · MEMBRANE ~200 nm THICK</text>
  </g>

  <!-- ======== PARTS LIST ======== -->
  <g font-size="13" fill="#DCEBFA">
    <rect x="50" y="770" width="620" height="186" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="795" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="804" x2="654" y2="804" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="824">1 — DIELECTRIC LIGHTSAIL: metamaterial membrane, &lt;1 g, 99.999% reflective</text>
    <text x="66" y="844">2 — STARCHIP PAYLOAD: 2 g wafer spacecraft, see DETAIL A</text>
    <text x="66" y="864">3 — RADIAL STIFFENING RIBS: spin-tensioned, set conical figure</text>
    <text x="66" y="884">4 — SACRIFICIAL DUST RIM: leading edge, absorbs 0.2c grain impacts</text>
    <text x="66" y="904">5 — CONICAL BEAM-RIDING FIGURE: passive self-centering on beam</text>
    <text x="66" y="924">6 — GROUND BEAM (NOT FLOWN): 100 GW phased fibre-laser array</text>
    <text x="66" y="944">7 — Pu-238 TRICKLE SOURCE: mg-scale, 20-year cruise power</text>
  </g>

  <text x="1350" y="760" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

  <!-- ======== TITLE BLOCK ======== -->
  <g font-size="12" fill="#DCEBFA">
    <rect x="700" y="770" width="650" height="186" fill="#0E3357" stroke="#DCEBFA" stroke-width="1.5"/>
    <line x1="700" y1="814" x2="1350" y2="814" stroke="#DCEBFA"/>
    <line x1="700" y1="858" x2="1350" y2="858" stroke="#DCEBFA"/>
    <line x1="700" y1="902" x2="1350" y2="902" stroke="#DCEBFA"/>
    <line x1="1030" y1="770" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="790" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="808" font-size="14" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="790" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="808" font-size="14" font-weight="bold">BR-1-GA-001 · REV A</text>
    <text x="716" y="834" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="852" font-weight="bold">BR-1 "SAGITTA" — GENERAL ARRANGEMENT</text>
    <text x="1046" y="834" fill="#6FC3FF">SCALE</text>
    <text x="1046" y="852" font-weight="bold">1 : 25 @ A1</text>
    <text x="716" y="878" fill="#6FC3FF">DEPLOYMENT ENVIRONMENT</text>
    <text x="716" y="896" font-weight="bold">INTERSTELLAR CRUISE, 0.2c, 20-YEAR MISSION</text>
    <text x="1046" y="878" fill="#6FC3FF">MASS (FLIGHT UNIT)</text>
    <text x="1046" y="896" font-weight="bold">3.5 g</text>
    <text x="716" y="922" fill="#6FC3FF">FUNCTION</text>
    <text x="716" y="940" font-weight="bold">LASER-PUSHED FLYBY RECON OF ALPHA CENTAURI</text>
    <text x="1046" y="922" fill="#6FC3FF">STATUS</text>
    <text x="1046" y="940" font-weight="bold">CONCEPT — RESEARCH FUNDED TODAY</text>
  </g>
</svg>
