<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#16406B" stroke-width="0.6"/>
    </pattern>
    <pattern id="gridMajor" width="125" height="125" patternUnits="userSpaceOnUse">
      <rect width="125" height="125" fill="url(#grid)"/>
      <path d="M 125 0 L 0 0 0 125" fill="none" stroke="#1E5288" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6FC3FF"/>
    </marker>
    <marker id="dim" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M1,1 L9,9 M5,0 L5,10" stroke="#DCEBFA" stroke-width="1" fill="none"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0B2A4A"/>
  <rect width="1400" height="1000" fill="url(#gridMajor)"/>
  <rect x="20" y="20" width="1360" height="960" fill="none" stroke="#DCEBFA" stroke-width="2"/>
  <rect x="28" y="28" width="1344" height="944" fill="none" stroke="#DCEBFA" stroke-width="0.8"/>

  <text x="50" y="70" fill="#DCEBFA" font-size="29" letter-spacing="3" font-weight="bold">PROPELLANT KELP FARM — PD-1 "POSEIDON"</text>
  <text x="50" y="96" fill="#6FC3FF" font-size="14" letter-spacing="2">SOLAR-POWERED ELECTROLYSIS DEPOT · GENERAL ARRANGEMENT · PROCESS FLOW · SHEET 1 OF 5</text>
  <line x1="50" y1="110" x2="1350" y2="110" stroke="#6FC3FF" stroke-width="1"/>

  <!-- ======== MAIN STATION VIEW ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="2">
    <!-- central truss spine -->
    <line x1="250" y1="440" x2="820" y2="440" stroke-width="3"/>
    <path d="M 250 428 h570 M 250 452 h570" stroke-width="0.8"/>
    <g stroke-width="0.7">
      <line x1="290" y1="428" x2="310" y2="452"/><line x1="350" y1="428" x2="370" y2="452"/>
      <line x1="410" y1="428" x2="430" y2="452"/><line x1="470" y1="428" x2="490" y2="452"/>
      <line x1="620" y1="428" x2="640" y2="452"/><line x1="680" y1="428" x2="700" y2="452"/>
      <line x1="740" y1="428" x2="760" y2="452"/>
    </g>

    <!-- SOLAR CANOPY "kelp fronds" (top) -->
    <g stroke-width="1.4">
      <line x1="330" y1="428" x2="300" y2="230"/>
      <rect x="250" y="185" width="110" height="46" transform="rotate(-8 305 208)"/>
      <line x1="430" y1="428" x2="410" y2="220"/>
      <rect x="360" y="175" width="110" height="46" transform="rotate(-8 415 198)"/>
      <line x1="530" y1="428" x2="520" y2="230"/>
      <rect x="470" y="185" width="110" height="46" transform="rotate(-8 525 208)"/>
    </g>
    <g stroke-width="0.6">
      <path d="M 262 195 v40 M 288 190 v40 M 314 186 v40 M 340 182 v40" transform="rotate(-8 305 208)"/>
      <path d="M 372 185 v40 M 398 180 v40 M 424 176 v40 M 450 172 v40" transform="rotate(-8 415 198)"/>
      <path d="M 482 195 v40 M 508 190 v40 M 534 186 v40 M 560 182 v40" transform="rotate(-8 525 208)"/>
    </g>

    <!-- INTAKE DOCK (left) with water tanker -->
    <rect x="150" y="405" width="100" height="70" rx="8"/>
    <ellipse cx="120" cy="440" rx="34" ry="24"/>
    <path d="M 120 416 v48 M 96 440 h48" stroke-width="0.7"/>
    <text x="120" y="444" fill="#6FC3FF" font-size="10" text-anchor="middle" stroke="none">H2O</text>
    <line x1="154" y1="440" x2="150" y2="440"/>

    <!-- ELECTROLYSIS HALL (center-bottom) -->
    <rect x="380" y="470" width="140" height="90" rx="8"/>
    <path d="M 400 490 h100 M 400 510 h100 M 400 530 h100" stroke-width="0.7"/>
    <line x1="410" y1="480" x2="410" y2="550" stroke="#6FC3FF" stroke-width="1.4"/>
    <line x1="490" y1="480" x2="490" y2="550" stroke="#6FC3FF" stroke-width="1.4"/>
    <text x="450" y="576" fill="#6FC3FF" font-size="9.5" text-anchor="middle" stroke="none">ELECTROLYSIS HALL</text>

    <!-- CRYO TANK FARM (right) -->
    <circle cx="640" cy="360" r="46"/>
    <circle cx="640" cy="360" r="36" stroke-dasharray="4 4" stroke-width="1"/>
    <text x="640" y="364" fill="#DCEBFA" font-size="13" text-anchor="middle" stroke="none">LH2</text>
    <circle cx="740" cy="380" r="38"/>
    <circle cx="740" cy="380" r="29" stroke-dasharray="4 4" stroke-width="1"/>
    <text x="740" y="384" fill="#DCEBFA" font-size="12" text-anchor="middle" stroke="none">LO2</text>
    <!-- sunshields -->
    <path d="M 580 300 q 100 -30 210 0" stroke-width="1.2" stroke-dasharray="6 4"/>
    <text x="600" y="292" fill="#6FC3FF" font-size="9.5" stroke="none">SUNSHIELD / MLI</text>
    <!-- cryocooler radiators -->
    <g stroke-width="1.3">
      <line x1="690" y1="405" x2="700" y2="470"/><line x1="705" y1="402" x2="716" y2="470"/>
      <line x1="720" y1="400" x2="732" y2="470"/>
    </g>

    <!-- TRANSFER BOOM + customer ship (right) -->
    <line x1="820" y1="440" x2="900" y2="440" stroke-width="2.5"/>
    <path d="M 900 430 h 20 v 20 h -20 z"/>
    <path d="M 920 415 l 70 0 l 20 25 l -20 25 l -70 0 z"/>
    <path d="M 990 428 l 26 0 M 990 452 l 26 0" stroke-width="1"/>
    <text x="960" y="405" fill="#6FC3FF" font-size="10" text-anchor="middle" stroke="none">CUSTOMER SHIP</text>
    <!-- fuel flow arrow -->
    <path d="M 824 462 h 74" stroke="#6FC3FF" stroke-width="1.4" marker-end="url(#arrow)"/>
    <text x="860" y="480" fill="#6FC3FF" font-size="9" text-anchor="middle" stroke="none">FILL</text>
  </g>

  <!-- ======== PROCESS FLOW INSET (top right) ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.2">
    <rect x="1030" y="140" width="310" height="250" fill="#0E3357" stroke="#6FC3FF"/>
    <text x="1046" y="164" fill="#6FC3FF" font-size="12" letter-spacing="1" stroke="none">FIG. B — PROCESS FLOW</text>
    <rect x="1055" y="185" width="70" height="30"/>
    <text x="1090" y="204" fill="#DCEBFA" font-size="9" text-anchor="middle" stroke="none">WATER IN</text>
    <line x1="1090" y1="215" x2="1090" y2="238" marker-end="url(#arrow)" stroke="#6FC3FF"/>
    <rect x="1050" y="240" width="80" height="30"/>
    <text x="1090" y="259" fill="#DCEBFA" font-size="9" text-anchor="middle" stroke="none">ELECTROLYSE</text>
    <line x1="1090" y1="270" x2="1075" y2="292" marker-end="url(#arrow)" stroke="#6FC3FF"/>
    <line x1="1090" y1="270" x2="1105" y2="292" marker-end="url(#arrow)" stroke="#6FC3FF"/>
    <rect x="1035" y="294" width="70" height="28"/>
    <text x="1070" y="312" fill="#DCEBFA" font-size="9" text-anchor="middle" stroke="none">H2 LIQ.</text>
    <rect x="1115" y="294" width="70" height="28"/>
    <text x="1150" y="312" fill="#DCEBFA" font-size="9" text-anchor="middle" stroke="none">O2 LIQ.</text>
    <line x1="1070" y1="322" x2="1090" y2="344" marker-end="url(#arrow)" stroke="#6FC3FF"/>
    <line x1="1150" y1="322" x2="1130" y2="344" marker-end="url(#arrow)" stroke="#6FC3FF"/>
    <rect x="1055" y="346" width="110" height="28"/>
    <text x="1110" y="364" fill="#DCEBFA" font-size="9" text-anchor="middle" stroke="none">CRYO STORE → SELL</text>
  </g>

  <!-- ======== DETAIL A: zero-boil-off tank ======== -->
  <g stroke="#DCEBFA" fill="none" stroke-width="1.4">
    <circle cx="1150" cy="560" r="86" stroke="#6FC3FF"/>
    <circle cx="1150" cy="560" r="60"/>
    <circle cx="1150" cy="560" r="52" stroke-dasharray="3 3" stroke-width="0.8"/>
    <circle cx="1150" cy="560" r="34"/>
    <text x="1150" y="564" fill="#DCEBFA" font-size="12" text-anchor="middle" stroke="none">LH2</text>
    <!-- cryocooler coil -->
    <path d="M 1150 526 q 14 -8 0 -16" stroke="#6FC3FF" stroke-width="1.2"/>
    <line x1="1150" y1="500" x2="1150" y2="474" stroke-width="1"/>
    <rect x="1136" y="454" width="28" height="20"/>
    <g fill="#DCEBFA" font-size="9" stroke="none">
      <text x="1150" y="468" text-anchor="middle" font-size="8">CRYOCOOLER</text>
      <text x="1234" y="540">MLI</text>
      <text x="1224" y="562">VAPOUR SHIELD</text>
    </g>
    <text x="1150" y="676" fill="#6FC3FF" font-size="12" text-anchor="middle" stroke="none">DETAIL A — ZERO-BOIL-OFF LH2 TANK</text>
    <line x1="640" y1="330" x2="1064" y2="548" stroke="#6FC3FF" stroke-width="0.9" stroke-dasharray="5 4"/>
  </g>

  <!-- ======== CALLOUTS ======== -->
  <g stroke="#6FC3FF" stroke-width="1" fill="none">
    <line x1="415" y1="185" x2="360" y2="150" marker-start="url(#arrow)"/>
    <line x1="120" y1="464" x2="150" y2="700" marker-start="url(#arrow)"/>
    <line x1="450" y1="560" x2="520" y2="700" marker-start="url(#arrow)"/>
    <line x1="600" y1="340" x2="600" y2="180" marker-start="url(#arrow)"/>
    <line x1="720" y1="360" x2="820" y2="220" marker-start="url(#arrow)"/>
    <line x1="905" y1="440" x2="950" y2="700" marker-start="url(#arrow)"/>
  </g>
  <g fill="#DCEBFA" font-size="13">
    <g><circle cx="350" cy="142" r="12" fill="none" stroke="#6FC3FF"/><text x="350" y="147" text-anchor="middle">1</text></g>
    <g><circle cx="150" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="150" y="717" text-anchor="middle">2</text></g>
    <g><circle cx="520" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="520" y="717" text-anchor="middle">3</text></g>
    <g><circle cx="600" cy="170" r="12" fill="none" stroke="#6FC3FF"/><text x="600" y="175" text-anchor="middle">4</text></g>
    <g><circle cx="830" cy="212" r="12" fill="none" stroke="#6FC3FF"/><text x="830" y="217" text-anchor="middle">5</text></g>
    <g><circle cx="950" cy="712" r="12" fill="none" stroke="#6FC3FF"/><text x="950" y="717" text-anchor="middle">6</text></g>
  </g>

  <!-- dimension -->
  <g stroke="#DCEBFA" stroke-width="1" fill="#DCEBFA">
    <line x1="120" y1="640" x2="1016" y2="640" marker-start="url(#dim)" marker-end="url(#dim)"/>
    <text x="568" y="662" text-anchor="middle" font-size="14">STATION SPAN 140 m (CANOPY DEPLOYED, SCHEMATIC)</text>
  </g>

  <!-- ======== PARTS LIST ======== -->
  <g font-size="13" fill="#DCEBFA">
    <rect x="50" y="770" width="620" height="186" fill="#0E3357" stroke="#6FC3FF" stroke-width="1"/>
    <text x="66" y="795" fill="#6FC3FF" font-size="14" letter-spacing="2" font-weight="bold">PARTS &amp; SYSTEMS INDEX</text>
    <line x1="66" y1="804" x2="654" y2="804" stroke="#6FC3FF" stroke-width="0.7"/>
    <text x="66" y="824">1 — SOLAR CANOPY ("KELP FRONDS"): thin-film PV, sun-tracking, MW-class</text>
    <text x="66" y="844">2 — INTAKE DOCK: receives + purifies water (launched, later mined ice)</text>
    <text x="66" y="864">3 — ELECTROLYSIS HALL: splits H2O → H2 + O2, ISS-heritage cells scaled</text>
    <text x="66" y="884">4 — SUNSHIELD / MLI: keeps tank farm in permanent shadow</text>
    <text x="66" y="904">5 — CRYO TANK FARM: zero-boil-off LH2 + LO2, see DETAIL A</text>
    <text x="66" y="924">6 — TRANSFER BOOM: cryogenic fuelling of docked customer vehicle</text>
  </g>

  <text x="1350" y="760" fill="#6FC3FF" font-size="11" text-anchor="end" letter-spacing="1">DESIGNED BY: W.A. SANDUN PRIYANKARA WIJERATHNE · sandunwijerathne51@gmail.com · github.com/sandunwijerathne</text>

  <!-- ======== TITLE BLOCK ======== -->
  <g font-size="12" fill="#DCEBFA">
    <rect x="700" y="770" width="650" height="186" fill="#0E3357" stroke="#DCEBFA" stroke-width="1.5"/>
    <line x1="700" y1="814" x2="1350" y2="814" stroke="#DCEBFA"/>
    <line x1="700" y1="858" x2="1350" y2="858" stroke="#DCEBFA"/>
    <line x1="700" y1="902" x2="1350" y2="902" stroke="#DCEBFA"/>
    <line x1="1030" y1="770" x2="1030" y2="956" stroke="#DCEBFA"/>
    <text x="716" y="790" fill="#6FC3FF" letter-spacing="1">PROJECT</text>
    <text x="716" y="808" font-size="14" font-weight="bold">OFF-WORLD CIVILISATION TOOLKIT</text>
    <text x="1046" y="790" fill="#6FC3FF">DRAWING NO.</text>
    <text x="1046" y="808" font-size="14" font-weight="bold">PD-1-GA-001 · REV A</text>
    <text x="716" y="834" fill="#6FC3FF">UNIT DESIGNATION</text>
    <text x="716" y="852" font-weight="bold" font-size="11">PD-1 "POSEIDON" — GENERAL ARRANGEMENT</text>
    <text x="1046" y="834" fill="#6FC3FF">ORBIT</text>
    <text x="1046" y="852" font-weight="bold">LEO / MEO / L-POINT</text>
    <text x="716" y="878" fill="#6FC3FF">DEPLOYMENT ENVIRONMENT</text>
    <text x="716" y="896" font-weight="bold" font-size="11">EARTH ORBIT, CONTINUOUS OPERATION</text>
    <text x="1046" y="878" fill="#6FC3FF">PRODUCT</text>
    <text x="1046" y="896" font-weight="bold">LH2 + LO2</text>
    <text x="716" y="922" fill="#6FC3FF">FUNCTION</text>
    <text x="716" y="940" font-weight="bold" font-size="11">MAKES ROCKET FUEL FROM WATER + SUNLIGHT</text>
    <text x="1046" y="922" fill="#6FC3FF">STATUS</text>
    <text x="1046" y="940" font-weight="bold" font-size="10.5">CONCEPT — NEAR-TERM, PROFIT-DRIVEN</text>
  </g>
</svg>
